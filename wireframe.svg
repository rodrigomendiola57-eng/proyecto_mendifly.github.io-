<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <rect width="1200" height="900" fill="#ffffff"/>

  <!-- Header / Navbar -->
  <rect x="40" y="30" width="1120" height="70" fill="#f5f5f5" stroke="#333333" stroke-width="2" rx="4"/>
  <text x="60" y="72" font-family="Arial, sans-serif" font-size="18" fill="#333333">Logo</text>
  <text x="900" y="72" font-family="Arial, sans-serif" font-size="16" fill="#666666">Nav Link 1   Nav Link 2   Nav Link 3</text>
  <text x="560" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#999999">Header</text>

  <!-- Hero Section -->
  <rect x="40" y="130" width="1120" height="280" fill="#f9f9f9" stroke="#333333" stroke-width="2" rx="4"/>
  <text x="560" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#999999">Hero Section</text>

  <!-- Título -->
  <rect x="340" y="190" width="520" height="50" fill="#e0e0e0" stroke="#666666" stroke-width="1.5" rx="3"/>
  <text x="600" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#444444">Título Principal</text>

  <!-- Descripción -->
  <rect x="400" y="260" width="400" height="30" fill="#e8e8e8" stroke="#999999" stroke-width="1" rx="2"/>
  <text x="600" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#666666">Párrafo descriptivo</text>

  <!-- Botón CTA -->
  <rect x="520" y="310" width="160" height="45" fill="#d0d0d0" stroke="#333333" stroke-width="1.5" rx="6"/>
  <text x="600" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333333">Botón CTA</text>

  <!-- Servicios / Contenido -->
  <text x="560" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#999999">Sección Servicios</text>

  <rect x="40" y="470" width="350" height="250" fill="#f5f5f5" stroke="#333333" stroke-width="2" rx="4"/>
  <text x="215" y="600" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#444444">Servicio 1</text>

  <rect x="425" y="470" width="350" height="250" fill="#f5f5f5" stroke="#333333" stroke-width="2" rx="4"/>
  <text x="600" y="600" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#444444">Servicio 2</text>

  <rect x="810" y="470" width="350" height="250" fill="#f5f5f5" stroke="#333333" stroke-width="2" rx="4"/>
  <text x="985" y="600" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#444444">Servicio 3</text>

  <!-- Footer -->
  <rect x="40" y="760" width="1120" height="70" fill="#f0f0f0" stroke="#333333" stroke-width="2" rx="4"/>
  <text x="560" y="790" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#999999">Footer</text>
  <text x="560" y="815" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#666666">Derechos reservados</text>
</svg>
