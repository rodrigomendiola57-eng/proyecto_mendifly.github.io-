<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mendifly | Proyecto Final</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #050505;
      color: #ffffff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 1.25rem;
    }

    h1 .highlight {
      color: #00e5ff;
    }

    .subtitle {
      font-size: clamp(1rem, 3vw, 1.25rem);
      font-weight: 300;
      color: #a0a0a0;
      letter-spacing: 0.04em;
      margin-bottom: 3rem;
    }

    footer {
      font-size: 0.75rem;
      color: #a0a0a0;
      opacity: 0.6;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main>
    <h1><span class="highlight">Mend</span>ifly</h1>
    <p class="subtitle">Fase 1: Ambientación y aprovisionamiento</p>
  </main>
  <footer>Materia: Diseño Web</footer>
</body>
</html>
